<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stopwatch App</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="stopwatch-card">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>⏱ Stopwatch</h2>

            <button id="themeBtn" class="btn btn-secondary">
                🌙
            </button>
        </div>

        <div id="display">
            00 : 00 : 00
        </div>

        <div class="buttons">

            <button class="btn btn-success" onclick="startStopwatch()">
                Start
            </button>

            <button class="btn btn-warning" onclick="pauseStopwatch()">
                Pause
            </button>

            <button class="btn btn-danger" onclick="resetStopwatch()">
                Reset
            </button>

        </div>

    </div>

</div>

<script src="app.js"></script>

</body>
</html>
